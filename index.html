<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Il Grimorio dei Frammenti</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;

      color: #d8c08a;
      font-family: Georgia, "Times New Roman", serif;

      background:
        radial-gradient(circle at 82% 8%, rgba(255, 160, 45, 0.30), transparent 13%),
        radial-gradient(circle at 88% 82%, rgba(255, 120, 30, 0.22), transparent 15%),
        radial-gradient(circle at 50% 28%, rgba(145, 95, 35, 0.18), transparent 34%),
        linear-gradient(90deg, #020202 0%, #100b08 18%, #21170f 50%, #100b08 82%, #020202 100%);

      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          35deg,
          rgba(255,255,255,0.025) 0px,
          rgba(255,255,255,0.025) 1px,
          transparent 1px,
          transparent 7px
        ),
        radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.58) 72%, rgba(0,0,0,0.95) 100%);
      mix-blend-mode: overlay;
      opacity: 0.65;
    }

    body::after {
      content: "";
      position: fixed;
      right: 4%;
      top: 4%;
      width: 90px;
      height: 260px;
      border-radius: 50%;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 8%, rgba(255, 214, 120, 0.95), rgba(255, 125, 25, 0.28) 18%, transparent 36%),
        linear-gradient(to bottom, rgba(155, 90, 30, 0.14), transparent);
      filter: blur(1px);
      opacity: 0.85;
    }

    .grimorio {
      position: relative;
      width: 760px;
      max-width: 94vw;
      padding: 46px 54px;
      text-align: center;
      overflow: hidden;

      background:
        linear-gradient(rgba(25, 21, 15, 0.94), rgba(7, 7, 6, 0.97)),
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.025) 0px,
          rgba(255,255,255,0.025) 1px,
          transparent 1px,
          transparent 6px
        );

      border: 1px solid rgba(181, 129, 54, 0.75);
      border-radius: 8px;

      box-shadow:
        0 0 48px rgba(0,0,0,0.95),
        inset 0 0 70px rgba(0,0,0,0.9),
        inset 0 0 22px rgba(186, 130, 55, 0.16);
    }

    .grimorio::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(172, 123, 55, 0.58);
      pointer-events: none;
      box-shadow:
        inset 0 0 20px rgba(176, 122, 42, 0.13),
        0 0 8px rgba(0,0,0,0.8);
    }

    .grimorio::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 10% 15%, rgba(255,255,255,0.07), transparent 10%),
        radial-gradient(circle at 88% 72%, rgba(185, 95, 25, 0.10), transparent 18%),
        linear-gradient(90deg, rgba(0,0,0,0.46), transparent 18%, transparent 82%, rgba(0,0,0,0.58));
      opacity: 0.75;
    }

    .contenuto {
      position: relative;
      z-index: 2;
    }

    .ornamento {
      color: #8d6a36;
      margin: 8px auto 20px;
      letter-spacing: 8px;
      font-size: 18px;
      opacity: 0.9;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 76px);
      line-height: 0.95;
      color: #c99a45;
      font-weight: normal;
      letter-spacing: 1px;
      text-shadow:
        0 0 6px rgba(255, 204, 103, 0.28),
        0 3px 0 rgba(0,0,0,0.85);
    }

    h2 {
      color: #d6ad5d;
      font-weight: normal;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(214, 173, 93, 0.28);
    }

    .sottotitolo {
      margin-top: 10px;
      font-size: 24px;
      color: #c8b17d;
      opacity: 0.95;
    }

    .testo-intro {
      margin: 28px auto 26px;
      max-width: 570px;
      font-size: 19px;
      line-height: 1.55;
      color: #b79f70;
    }

    .separatore {
      height: 1px;
      margin: 25px auto;
      width: 82%;
      background: linear-gradient(90deg, transparent, rgba(179, 126, 48, 0.75), transparent);
      position: relative;
    }

    .separatore::before {
      content: "✦";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #11100d;
      padding: 0 12px;
      color: #9b743b;
    }

    .label-frammenti {
      margin-bottom: 14px;
      color: #c69445;
      font-size: 17px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .frammenti {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin: 18px auto 30px;
      padding: 18px;
      border: 1px solid rgba(164, 113, 44, 0.45);
      background: rgba(0,0,0,0.18);
      max-width: 560px;
    }

    .sigillo {
