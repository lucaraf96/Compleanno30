<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Il Grimorio dei Frammenti</title>

  <style>
    :root {
      --oro: #c89b3c;
      --oro-chiaro: #f0d28a;
      --oro-scuro: #7b5620;
      --rosso: #720d08;
      --rosso-scuro: #320403;
      --nero: #050403;
      --pelle: #15110c;
      --testo: #d8c093;
      --testo-soft: #9d8760;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--testo);
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px;

      background:
        radial-gradient(circle at 88% 10%, rgba(255, 151, 34, 0.35), transparent 12%),
        radial-gradient(circle at 95% 78%, rgba(255, 119, 23, 0.30), transparent 14%),
        radial-gradient(circle at 50% 30%, rgba(148, 86, 26, 0.25), transparent 42%),
        linear-gradient(90deg, #020202 0%, #0b0704 20%, #17100b 50%, #080504 82%, #000 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 50%, transparent 42%, rgba(0, 0, 0, 0.80) 100%),
        repeating-linear-gradient(
          35deg,
          rgba(255, 255, 255, 0.025) 0px,
          rgba(255, 255, 255, 0.025) 1px,
          transparent 1px,
          transparent 7px
        );
      mix-blend-mode: overlay;
      z-index: 1;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.85), transparent 18%, transparent 82%, rgba(0,0,0,0.85)),
        linear-gradient(0deg, rgba(0,0,0,0.8), transparent 20%, transparent 80%, rgba(0,0,0,0.75));
      z-index: 2;
    }

    .pagina {
      position: relative;
      z-index: 3;
      width: min(860px, 96vw);
    }

    .grimorio {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 760px;
      padding: 72px 70px 58px;
      text-align: center;

      background:
        radial-gradient(circle at 50% 20%, rgba(198, 138, 54, 0.16), transparent 28%),
        linear-gradient(180deg, rgba(42, 33, 22, 0.98), rgba(13, 10, 7, 0.98)),
        repeating-linear-gradient(
          110deg,
          rgba(255,255,255,0.025) 0px,
          rgba(255,255,255,0.025) 1px,
          transparent 1px,
          transparent 9px
        );

      border: 1px solid rgba(200, 155, 60, 0.65);
      border-radius: 8px;

      box-shadow:
        0 0 70px rgba(0,0,0,0.95),
        inset 0 0 90px rgba(0,0,0,0.85),
        inset 0 0 0 8px rgba(80, 50, 23, 0.25),
        inset 0 0 0 13px rgba(0,0,0,0.55);
    }

    .grimorio::before {
      content: "";
      position: absolute;
      inset: 26px;
      border: 1px solid rgba(200, 155, 60, 0.45);
      pointer-events: none;
      box-shadow:
        inset 0 0 22px rgba(200, 155, 60, 0.10),
        0 0 18px rgba(0,0,0,0.5);
    }

    .grimorio::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 8%, rgba(255,255,255,0.10), transparent 6%),
        radial-gradient(circle at 88% 92%, rgba(208,112,21,0.18), transparent 18%),
        linear-gradient(90deg, rgba(0,0,0,0.65), transparent 12%, transparent 88%, rgba(0,0,0,0.7));
      opacity: 0.75;
    }

    .contenuto {
      position: relative;
      z-index: 2;
    }

    .ornamento {
      width: 70%;
      height: 1px;
      margin: 22px auto 28px;
      background: linear-gradient(90deg, transparent, rgba(200,155,60,0.65), transparent);
      position: relative;
    }

    .ornamento::before,
    .ornamento::after {
      content: "✦";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(200,155,60,0.8);
      font-size: 16px;
    }

    .ornamento::before {
      left: 48%;
    }

    .ornamento::after {
      right: 48%;
    }

    h1 {
      margin: 0;
      font-size: clamp(52px, 8vw, 88px);
      line-height: 0.9;
      font-weight: normal;
      letter-spacing: 1px;
      color: var(--oro-chiaro);
      text-shadow:
        0 2px 0 #4e3515,
        0 0 18px rgba(200,155,60,0.35),
        0 0 38px rgba(0,0,0,0.95);
    }

    h1 span {
      display: block;
