<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Il Grimorio dei Frammenti</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --oro: #c89b3c;
      --oro-chiaro: #f4d98a;
      --oro-scuro: #6f4d1c;
      --rosso: #801109;
      --rosso-scuro: #310403;
      --nero: #050403;
      --pelle: #17110b;
      --testo: #d8c093;
      --testo-soft: #9d8760;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--testo);
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px;
      overflow-x: hidden;

      background:
        radial-gradient(circle at 90% 8%, rgba(255, 168, 58, 0.42), transparent 10%),
        radial-gradient(circle at 96% 78%, rgba(255, 118, 28, 0.36), transparent 13%),
        radial-gradient(circle at 8% 22%, rgba(231, 104, 31, 0.18), transparent 17%),
        radial-gradient(circle at 50% 30%, rgba(139, 78, 27, 0.26), transparent 42%),
        linear-gradient(90deg, #010101 0%, #090604 20%, #17100b 50%, #070403 82%, #000 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;

      background:
        radial-gradient(circle at 50% 50%, transparent 40%, rgba(0, 0, 0, 0.86) 100%),
        repeating-linear-gradient(
          35deg,
          rgba(255, 255, 255, 0.022) 0px,
          rgba(255, 255, 255, 0.022) 1px,
          transparent 1px,
          transparent 7px
        );
      mix-blend-mode: overlay;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;

      background:
        linear-gradient(90deg, rgba(0,0,0,0.9), transparent 18%, transparent 82%, rgba(0,0,0,0.9)),
        linear-gradient(0deg, rgba(0,0,0,0.75), transparent 23%, transparent 77%, rgba(0,0,0,0.72));
    }

    .pagina {
      position: relative;
      z-index: 3;
      width: min(900px, 96vw);
    }

    .grimorio {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 780px;
      padding: 72px 70px 58px;
      text-align: center;

      background:
        radial-gradient(circle at 50% 20%, rgba(207, 143, 54, 0.17), transparent 30%),
        radial-gradient(circle at 92% 84%, rgba(160, 75, 18, 0.16), transparent 22%),
        radial-gradient(circle at 7% 10%, rgba(255,255,255,0.08), transparent 6%),
        linear-gradient(180deg, rgba(36, 28, 18, 0.99), rgba(9, 7, 5, 0.99)),
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.024) 0px,
          rgba(255,255,255,0.024) 2px,
          transparent 2px,
          transparent 8px
        );

      border: 1px solid rgba(200, 155, 60, 0.65);
      border-radius: 8px;

      box-shadow:
        0 0 75px rgba(0,0,0,0.98),
        inset 0 0 95px rgba(0,0,0,0.92),
        inset 0 0 0 8px rgba(80, 50, 23, 0.24),
        inset 0 0 0 13px rgba(0,0,0,0.58);
    }

    .grimorio::before {
      content: "";
      position: absolute;
      inset: 25px;
      border: 1px solid rgba(200, 155, 60, 0.45);
      pointer-events: none;
      box-shadow:
        inset 0 0 22px rgba(200, 155, 60, 0.10),
        0 0 18px rgba(0,0,0,0.5);
    }

    .grimorio::after {
      content: "✦";
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(200, 155, 60, 0.82);
      font-size: 28px;
