<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro dei Frammenti</title>

<style>

body {
    margin: 0;
    height: 100vh;
    background:
    radial-gradient(circle, #3b2a16, #0d0805);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Georgia, serif;
    color: #e8d8a8;
}

.grimorio {
    width: 90%;
    max-width: 500px;
    background: rgba(30,18,8,0.9);
    border: 3px solid #b99652;
    border-radius: 12px;
    padding: 35px;
    text-align: center;
    box-shadow: 0 0 40px #000;
}

h1 {
    font-size: 32px;
}

.frammenti {
    font-size: 20px;
    margin: 20px;
}

.barra {
    height: 20px;
    background: #24170b;
    border: 1px solid #b99652;
    margin: 20px 0;
}

.progresso {
    height:100%;
    width:0%;
    background:#b99652;
}

input {
    background:#140d06;
    border:1px solid #b99652;
    padding:12px;
    color:#e8d8a8;
    width:80%;
    text-align:center;
}

button {
    margin-top:15px;
    padding:12px 25px;
    background:#b99652;
    border:none;
    cursor:pointer;
    font-family:Georgia;
}

#messaggio {
    margin-top:20px;
}

</style>

</head>


<body>


<div class="grimorio">

<h1>📜 Registro dei Frammenti</h1>


<p>
Ho tentato di fermare il tempo.
<br>
Per evitare il compimento dei 30 anni,
ho diviso la mia essenza in sette frammenti.
</p>


<div class="frammenti">
Frammenti recuperati: <b>0 / 7</b>
</div>


<div class="barra">
<div class="progresso"></div>
</div>


<p id="istruzione">
Inserisci il codice del primo frammento:
</p>


<input id="codice" placeholder="Scrivi il codice">


<br>

<button onclick="sblocca()">
Sblocca
</button>


<div id="messaggio"></div>


</div>



<script>

function sblocca(){

let risposta =
document.getElementById("codice").value;


let frammenti = {
    "nascita": {
        numero: 1,
        messaggio: "✨ Primo frammento recuperato.<br><br>Il frammento della nascita è tornato alla sua origine.<br>Ne restano sei..."
    },

    "tempo": {
        numero: 2,
        messaggio: "⏳ Secondo frammento recuperato.<br><br>Il tempo ha iniziato a scorrere di nuovo."
    },

    "ricordo": {
        numero: 3,
        messaggio: "📜 Terzo frammento recuperato.<br><br>Un ricordo perduto è riaffiorato."
    },

    "ombra": {
        numero: 4,
        messaggio: "🌑 Quarto frammento recuperato.<br><br>L'ombra non nasconde più nulla."
    },

    "coraggio": {
        numero: 5,
        messaggio: "🔥 Quinto frammento recuperato.<br><br>Il coraggio è stato ritrovato."
    },

    "sogno": {
        numero: 6,
        messaggio: "✨ Sesto frammento recuperato.<br><br>Il futuro è nuovamente possibile."
    },

    "anima": {
        numero: 7,
        messaggio: "🎂 Settimo frammento recuperato.<br><br>L'anima è completa."
    }
};



let codice = risposta.toLowerCase();


if(frammenti[codice]){


let n = frammenti[codice].numero;

document.getElementById("codice").value = "";


document.getElementById("istruzione").innerHTML =
"Il grimorio attende il codice del frammento " + (n+1) + ".";

document.querySelector(".progresso").style.width =
(n*14.28)+"%";


document.querySelector(".frammenti").innerHTML =
"Frammenti recuperati: <b>"+n+" / 7</b>";


document.getElementById("messaggio").innerHTML =
frammenti[codice].messaggio;


}

else {

document.getElementById("messaggio").innerHTML =
"Il grimorio rifiuta questa parola.";

}

}

</script>


</body>
</html>
